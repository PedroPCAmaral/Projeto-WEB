<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos JavaScript</title>
</head>
<body>

<h1>JavaScript: Eventos</h1>
<hr>

<h2>Propriedades e AddEventListener</h2>

<button id="botao1">Clique</button>
<button id="botao2">Passe o mouse aqui</button>

<br><br>

<label>Digite aqui:</label>
<input type="text" id="campoTexto" placeholder="Digite aqui">

<p id="resultado">Você digitou: </p>

<br><br>

<button id="botao3">Testar múltiplos eventos</button>
<p id="mensagem1"></p>
<p id="mensagem2"></p>

<hr>

<h2>Drag and Drop</h2>

<div id="caixa" draggable="true"
     style="width:100px;height:100px;background:red;color:white;display:flex;align-items:center;justify-content:center;">
    Arraste
</div>

<div id="area"
     style="width:200px;height:200px;border:2px dashed black;margin-top:20px;">
    Solte aqui
</div>

<script src="script.js" defer></script>

</body>
</html>
